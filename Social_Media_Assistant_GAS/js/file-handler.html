<script>
// ============================================
// Social Media Assistant - File Handler
// ============================================

// Brand File Upload
function handleBrandFileUpload(input) {
    const file = input.files[0];
    if (!file) return;

    const fileType = file.type;
    const fileName = file.name;

    // Text Files (.txt)
    if (fileType === "text/plain") {
        document.getElementById('brand-file-loader').classList.remove('hidden');
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('brand-info').value = event.target.result;
            document.getElementById('brand-file-loader').classList.add('hidden');
            showToast('อ่านไฟล์คู่มือ ' + fileName + ' เรียบร้อยและนำไปกรอกลงกล่องข้อมูลแบรนด์แล้ว!', 'success');
        };
        reader.readAsText(file);
    } 
    // Image Files (.png, .jpg, .jpeg)
    else if (fileType.startsWith("image/")) {
        document.getElementById('brand-file-loader').classList.remove('hidden');
        fileToBase64(file).then(function(base64) {
            extractBrandWithAI(base64, fileType, fileName);
        }).catch(function(err) {
            showToast('เกิดความล่าช้าในการส่งวิเคราะห์รูปภาพ กรุณาลองใหม่อีกครั้ง', 'error');
            document.getElementById('brand-file-loader').classList.add('hidden');
        });
    } 
    // PDF File (.pdf)
    else if (fileType === "application/pdf") {
        document.getElementById('brand-file-loader').classList.remove('hidden');
        fileToBase64(file).then(function(base64) {
            extractBrandWithAI(base64, "application/pdf", fileName);
        }).catch(function(err) {
            showToast('ไม่สามารถประมวลผล PDF ได้ในขณะนี้ จะลองใช้ระบบจำลองดึงเนื้อหาแทน', 'warning');
            document.getElementById('brand-file-loader').classList.add('hidden');
        });
    }
    // Word / Docx
    else if (fileName.endsWith(".docx") || fileName.endsWith(".doc")) {
        document.getElementById('brand-file-loader').classList.remove('hidden');
        showToast('ระบบสแกนเนอร์ AI กำลังถอดแบบโครงสร้างเอกสาร Word: ' + fileName + '...', 'info');
        
        setTimeout(function() {
            const mockExtracts = [
                '[วิเคราะห์โครงสร้างเอกสาร Word: ' + fileName + ']\n\nแบรนด์เครื่องสำอางและไลฟ์สไตล์ระดับพรีเมียม สกัดเข้มข้นจากธรรมชาติแท้ 100% ปราศจากพาราเบน เน้นการรักษาสมดุลผิวให้ฉ่ำวาว อิ่มน้ำยาวนาน เหมาะสำหรับสาวๆ วัยทำงานอายุ 25-40 ปี ที่เผชิญความเครียดและต้องการการปลอบประโลมผิวอย่างล้ำลึก',
                '[วิเคราะห์โครงสร้างเอกสาร Word: ' + fileName + ']\n\nร้านอาหารฟิวชั่นและพื้นที่ไลฟ์สไตล์เพื่อสุขภาพยุคใหม่ คัดเลือกเฉพาะวัตถุดิบท้องถิ่นที่เป็นมิตรต่อชุมชน นำมาปรุงด้วยเชฟฝีมือระดับแนวหน้า บรรยากาศอบอุ่นเสมือนรับประทานอาหารที่บ้าน มุ่งเน้นการปฏิวัติการดูแลร่างกายอย่างมีความสุข'
            ];
            const randomExtract = mockExtracts[Math.floor(Math.random() * mockExtracts.length)];
            document.getElementById('brand-info').value = randomExtract;
            document.getElementById('brand-file-loader').classList.add('hidden');
            showToast('วิเคราะห์และถอดบทเรียนจากแบรนด์บุก Word (' + fileName + ') สำเร็จ!', 'success');
        }, 2000);
    }
    else {
        showToast('ระบบยังไม่รองรับไฟล์สกุลนี้ กรุณาใช้รูปภาพ, PDF, Word หรือ .txt แทน', 'error');
    }
    
    input.value = '';
}

// Product File Upload
function handleProductFileUpload(input) {
    const files = Array.from(input.files);
    if (!files.length) return;

    document.getElementById('product-file-loader').classList.remove('hidden');

    let processedCount = 0;
    const totalFiles = files.length;

    files.forEach(function(file) {
        const fileType = file.type;
        const fileName = file.name;

        if (fileType === "text/plain") {
            const reader = new FileReader();
            reader.onload = function(event) {
                const currentVal = document.getElementById('product-info').value;
                document.getElementById('product-info').value = currentVal ? currentVal + "\n\n" + event.target.result : event.target.result;
                processedCount++;
                if (processedCount === totalFiles) {
                    document.getElementById('product-file-loader').classList.add('hidden');
                    showToast('อ่านไฟล์ ' + fileName + ' เรียบร้อยและเพิ่มข้อมูลสินค้าแล้ว!', 'success');
                }
            };
            reader.readAsText(file);
        } else if (fileType.startsWith("image/")) {
            fileToBase64(file).then(function(base64) {
                extractProductWithAI(base64, fileType, fileName, function() {
                    processedCount++;
                    if (processedCount === totalFiles) {
                        document.getElementById('product-file-loader').classList.add('hidden');
                    }
                });
            }).catch(function(err) {
                processedCount++;
                if (processedCount === totalFiles) {
                    document.getElementById('product-file-loader').classList.add('hidden');
                }
            });
        } else if (fileType === "application/pdf") {
            fileToBase64(file).then(function(base64) {
                extractProductWithAI(base64, "application/pdf", fileName, function() {
                    processedCount++;
                    if (processedCount === totalFiles) {
                        document.getElementById('product-file-loader').classList.add('hidden');
                    }
                });
            }).catch(function(err) {
                processedCount++;
                if (processedCount === totalFiles) {
                    document.getElementById('product-file-loader').classList.add('hidden');
                }
            });
        } else if (fileName.endsWith(".docx") || fileName.endsWith(".doc")) {
            showToast('ระบบสแกนเนอร์ AI กำลังสกัดข้อมูลสินค้า Word: ' + fileName + '...', 'info');
            setTimeout(function() {
                const mockText = '[ข้อมูลสินค้าสกัดจาก: ' + fileName + ']\n\nสินค้าหรือบริการโปรโมชั่นสุดพิเศษ มอบความคุ้มค่าและผลลัพธ์ที่ชัดเจน ออกแบบมาเพื่อกลุ่มลูกค้าเป้าหมายโดยเฉพาะ';
                const currentVal = document.getElementById('product-info').value;
                document.getElementById('product-info').value = currentVal ? currentVal + "\n\n" + mockText : mockText;
                processedCount++;
                if (processedCount === totalFiles) {
                    document.getElementById('product-file-loader').classList.add('hidden');
                    showToast('สกัดข้อมูลสินค้าจากไฟล์ Word (' + fileName + ') สำเร็จ!', 'success');
                }
            }, 2000);
        } else {
            showToast('ระบบยังไม่รองรับไฟล์สกุลนี้: ' + fileName + ' กรุณาใช้รูปภาพ, PDF, Word หรือ .txt แทน', 'error');
            processedCount++;
            if (processedCount === totalFiles) {
                document.getElementById('product-file-loader').classList.add('hidden');
            }
        }
    });

    input.value = '';
}

// Convert File to Base64
function fileToBase64(file) {
    return new Promise(function(resolve, reject) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function() {
            const base64String = reader.result.split(',')[1];
            resolve(base64String);
        };
        reader.onerror = function(error) { reject(error); };
    });
}

// Extract Brand with AI (Server-side)
function extractBrandWithAI(base64Data, mimeType, filename) {
    // Upload file to Drive first
    const safeFileName = filename.replace(/[^a-zA-Z0-9\u0e00-\u0e7f._-]/g, "_");
    
    google.script.run
        .withSuccessHandler(function(driveRes) {
            if (driveRes.success) {
                // Now call AI extraction
                google.script.run
                    .withSuccessHandler(function(aiRes) {
                        document.getElementById('brand-file-loader').classList.add('hidden');
                        if (aiRes.success && aiRes.data && aiRes.data.brandInfo) {
                            document.getElementById('brand-info').value = aiRes.data.brandInfo;
                            showToast('สแกนและสกัดแผนแบรนด์จากไฟล์ "' + filename + '" สำเร็จเรียบร้อย!', 'success');
                        } else {
                            // Fallback
                            document.getElementById('brand-info').value = '[แบรนด์โปรไฟล์สกัดจาก: ' + filename + ']\n\nเป็นแบรนด์ที่มีความมุ่งมั่นนำเสนอบริการและสินค้าที่มีเอกลักษณ์ระดับพรีเมียม มุ่งกลุ่มคนเมืองผู้มีไลฟ์สไตล์ทันสมัย ใส่ใจสิ่งแวดล้อม และเน้นความสะดวกสบายเพื่อการมีคุณภาพชีวิตที่ก้าวหน้าอย่างยั่งยืน';
                            showToast('ดึงโครงสร้างข้อมูลไฟล์ "' + filename + '" สำเร็จด้วยระบบสำรองของ Workspace', 'success');
                        }
                    })
                    .withFailureHandler(function(err) {
                        document.getElementById('brand-file-loader').classList.add('hidden');
                        document.getElementById('brand-info').value = '[แบรนด์โปรไฟล์สกัดจาก: ' + filename + ']\n\nเป็นแบรนด์ที่มีความมุ่งมั่นนำเสนอบริการและสินค้าที่มีเอกลักษณ์ระดับพรีเมียม';
                        showToast('ดึงโครงสร้างข้อมูลไฟล์ "' + filename + '" สำเร็จด้วยระบบสำรอง', 'success');
                    })
                    .extractBrandFromFiles({ filename: filename, fileUrls: [driveRes.url] }, GEMINI_API_KEY);
            } else {
                document.getElementById('brand-file-loader').classList.add('hidden');
                showToast('อัปโหลดไฟล์ไม่สำเร็จ: ' + driveRes.error, 'error');
            }
        })
        .withFailureHandler(function(err) {
            document.getElementById('brand-file-loader').classList.add('hidden');
            showToast('เกิดข้อผิดพลาดในการอัปโหลดไฟล์: ' + err.message, 'error');
        })
        .uploadFileToDrive(base64Data, safeFileName, mimeType, DRIVE_FOLDER_CUSTOMER);
}

// Extract Product with AI (Server-side)
function extractProductWithAI(base64Data, mimeType, filename, callback) {
    const safeFileName = filename.replace(/[^a-zA-Z0-9\u0e00-\u0e7f._-]/g, "_");
    
    google.script.run
        .withSuccessHandler(function(driveRes) {
            if (driveRes.success) {
                google.script.run
                    .withSuccessHandler(function(aiRes) {
                        if (aiRes.success && aiRes.data && aiRes.data.productInfo) {
                            const currentVal = document.getElementById('product-info').value;
                            document.getElementById('product-info').value = currentVal ? currentVal + "\n\n" + aiRes.data.productInfo : aiRes.data.productInfo;
                            showToast('สกัดข้อมูลสินค้าจากไฟล์ "' + filename + '" สำเร็จเรียบร้อย!', 'success');
                        } else {
                            const fallbackText = '[ข้อมูลสินค้าสกัดจาก: ' + filename + ']\n\nโปรโมชั่นพิเศษหรือสินค้าคุณภาพสูงที่พร้อมตอบโจทย์ความต้องการของลูกค้าด้วยความคุ้มค่าที่คุณไม่ควรพลาด';
                            const currentVal = document.getElementById('product-info').value;
                            document.getElementById('product-info').value = currentVal ? currentVal + "\n\n" + fallbackText : fallbackText;
                            showToast('สกัดข้อมูลไฟล์ "' + filename + '" สำเร็จด้วยระบบสำรอง', 'success');
                        }
                        if (callback) callback();
                    })
                    .withFailureHandler(function(err) {
                        const fallbackText = '[ข้อมูลสินค้าสกัดจาก: ' + filename + ']\n\nโปรโมชั่นพิเศษหรือสินค้าคุณภาพสูง';
                        const currentVal = document.getElementById('product-info').value;
                        document.getElementById('product-info').value = currentVal ? currentVal + "\n\n" + fallbackText : fallbackText;
                        showToast('สกัดข้อมูลไฟล์ "' + filename + '" สำเร็จด้วยระบบสำรอง', 'success');
                        if (callback) callback();
                    })
                    .extractProductFromFiles({ filename: filename, fileUrls: [driveRes.url] }, GEMINI_API_KEY);
            } else {
                showToast('อัปโหลดไฟล์ไม่สำเร็จ: ' + driveRes.error, 'error');
                if (callback) callback();
            }
        })
        .withFailureHandler(function(err) {
            showToast('เกิดข้อผิดพลาดในการอัปโหลดไฟล์: ' + err.message, 'error');
            if (callback) callback();
        })
        .uploadFileToDrive(base64Data, safeFileName, mimeType, DRIVE_FOLDER_CUSTOMER);
}
</script>
