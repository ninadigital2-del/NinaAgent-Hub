<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Agent Task Tracker</title>
  <style>
    :root {
      --bg-color: #f8fafc;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --card-bg: #ffffff;
      --border-color: #e2e8f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      
      --status-paof-bg: #eff6ff;
      --status-paof-text: #1d4ed8;
      
      --status-adjust-bg: #fef2f2;
      --status-adjust-text: #dc2626;
      
      --status-done-bg: #f0fdf4;
      --status-done-text: #15803d;
      
      --status-delayed-bg: #fffbe1;
      --status-delayed-text: #d97706;
      
      --status-notstart-bg: #f1f5f9;
      --status-notstart-text: #64748b;
      
      --status-cancelled-bg: #f1f5f9;
      --status-cancelled-text: #475569;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      padding: 2rem;
    }

    #app {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-btn {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 0.5rem 1.25rem;
      border-radius: 9999px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .filter-btn:hover {
      background: rgba(241, 245, 249, 0.8);
      border-color: #cbd5e1;
    }

    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 4px 6px rgba(59, 130, 246, 0.25);
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .task-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .task-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.05);
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .task-id {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-family: monospace;
    }

    .task-title {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.4;
      margin-top: 0.5rem;
    }

    .task-owner {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: auto;
    }

    .owner-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
      color: white;
    }

    .status-badge {
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
    }

    .status-paof { background: var(--status-paof-bg); color: var(--status-paof-text); border: 1px solid currentColor; }
    .status-adjust { background: var(--status-adjust-bg); color: var(--status-adjust-text); border: 1px solid currentColor; }
    .status-done { background: var(--status-done-bg); color: var(--status-done-text); border: 1px solid currentColor; }
    .status-delayed { background: var(--status-delayed-bg); color: var(--status-delayed-text); border: 1px solid currentColor; }
    .status-notstart { background: var(--status-notstart-bg); color: var(--status-notstart-text); border: 1px solid currentColor; }
    .status-cancelled { background: var(--status-cancelled-bg); color: var(--status-cancelled-text); border: 1px solid currentColor; }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 1rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .card-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      border-top: 1px solid var(--border-color);
      padding-top: 1rem;
    }

    .btn-action {
      flex: 1;
      padding: 0.5rem;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all var(--transition-speed);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-action:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-revise { background: var(--status-adjust-bg); color: var(--status-adjust-text); border: 1px solid currentColor; }
    .btn-revise:hover:not(:disabled) { background: var(--status-adjust-text); color: white; }
    .btn-done { background: var(--status-done-bg); color: var(--status-done-text); border: 1px solid currentColor; }
    .btn-done:hover:not(:disabled) { background: var(--status-done-text); color: white; }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      background: #ffffff;
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      padding: 2rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      transform: translateY(20px);
      transition: transform 0.3s ease;
      border: 1px solid #e2e8f0;
    }
    .modal-overlay.active .modal-content {
      transform: translateY(0);
    }
    .modal-header {
      margin-bottom: 1.5rem;
    }
    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 0.5rem;
    }
    .modal-subtitle {
      font-size: 0.9rem;
      color: #64748b;
    }
    .textarea-comment {
      width: 100%;
      min-height: 120px;
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 1rem;
      color: #1e293b;
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
      margin-bottom: 1.5rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .textarea-comment:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .textarea-comment::placeholder {
      color: #94a3b8;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
    }
    .btn-cancel {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #64748b;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }

    .btn-submit {
      padding: 0.5rem 1.25rem;
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 500;
      transition: all var(--transition-speed);
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--primary-hover);
    }
    
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .task-meta {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .brand-badge {
      display: inline-block;
      background: rgba(148, 163, 184, 0.1);
      color: #94a3b8;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }
    .task-link {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      color: #3b82f6;
      text-decoration: none;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }
    .task-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading-container">
      <div class="spinner"></div>
      <p style="color: #94a3b8;">Loading your tasks...</p>
    </div>
  </div>

  <!-- Modal Structure -->
  <div class="modal-overlay" id="commentModalOverlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">✏️ มีปรับแก้</h2>
        <div class="modal-subtitle" id="modalTaskName">Task Name</div>
      </div>
      <textarea class="textarea-comment" id="commentInput" placeholder="พิมพ์คอมเมนต์ของคุณที่นี่..."></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeCommentModal()">ยกเลิก</button>
        <button class="btn-submit" id="btnSubmitComment" onclick="submitComment()">ส่งคอมเมนต์</button>
      </div>
    </div>
  </div>

  <script>
    let allTasks = [];
    let currentFilter = "Sent to P'Aof";
    const filters = ["Sent to P'Aof", 'มีปรับแก้'];
    
    // State สำหรับ Modal
    let activeTaskId = null;

    // Load data from Google Apps Script Backend
    function loadData(isSilent) {
      if (!isSilent) showMainLoading(true);
      
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(responseStr) {
            const data = JSON.parse(responseStr);
            if(data.success) {
              allTasks = data.tasks;
              renderApp();
            } else if (!isSilent) {
              document.getElementById('app').innerHTML = `<p style="color:red;text-align:center;">Error: ${data.error}</p>`;
            }
          })
          .withFailureHandler(function(err) {
            if (!isSilent) {
              document.getElementById('app').innerHTML = `<p style="color:red;text-align:center;">Failed to load data: ${err.message}</p>`;
            }
          })
          .getTasksData();
      } else {
        const url = new URL(window.location.href);
        url.searchParams.set('action', 'getTasks');
        
        fetch(url.href)
          .then(res => res.json())
          .then(data => {
            if(data.success) {
              allTasks = data.tasks;
              renderApp();
            } else if (!isSilent) {
              document.getElementById('app').innerHTML = `<p style="color:red;text-align:center;">Error: ${data.error}</p>`;
            }
          })
          .catch(err => {
            if (!isSilent) {
              document.getElementById('app').innerHTML = `<p style="color:red;text-align:center;">Failed to load data.</p>`;
            }
          });
      }
    }

    // Start loading & set up silent auto-refresh every 10s
    window.onload = function() {
      loadData(false);
      setInterval(function() {
        loadData(true);
      }, 10000);
    };
    
    function showMainLoading(show) {
      if (show) {
        document.getElementById('app').innerHTML = `
          <div class="loading-container">
            <div class="spinner"></div>
            <p style="color: #94a3b8;">Loading your tasks...</p>
          </div>
        `;
      }
    }

    function getStatusClass(status) {
      switch (status) {
        case "Sent to P'Aof": return 'status-paof';
        case 'มีปรับแก้': return 'status-adjust';
        case 'Done': return 'status-done';
        case 'Delayed': return 'status-delayed';
        case 'Not Start': return 'status-notstart';
        case 'Cancelled': return 'status-cancelled';
        default: return 'status-notstart';
      }
    }

    function setFilter(f) {
      currentFilter = f;
      renderApp();
    }
    
    function updateTaskOnWeb(taskId, status) {
      const btnRevise = document.getElementById(`btn-revise-${taskId}`);
      const btnDone = document.getElementById(`btn-done-${taskId}`);
      
      if (btnRevise) btnRevise.disabled = true;
      if (btnDone) btnDone.disabled = true;
      
      const targetBtn = status === 'Done' ? btnDone : btnRevise;
      if (targetBtn) {
        targetBtn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;"></div> กำลังบันทึก...';
      }

      function handleResult(res) {
        if (res.success) {
          const taskIndex = allTasks.findIndex(t => (t.uniqueId && String(t.uniqueId) === String(taskId)) || String(t.id) === String(taskId));
          if (taskIndex !== -1) {
            allTasks[taskIndex].status = status;
          }
          renderApp();
        } else {
          alert("Error: " + res.error);
          renderApp();
        }
      }

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(resStr) {
            try {
              handleResult(JSON.parse(resStr));
            } catch(e) {
              alert("Error parsing response: " + e.message);
              renderApp();
            }
          })
          .withFailureHandler(function(err) {
            alert("Failed: " + err.message);
            renderApp();
          })
          .updateTaskFromWeb(taskId, status, "");
      } else {
        // Fallback for iframe / standalone web view
        const url = new URL(window.location.href);
        url.searchParams.set('action', 'updateTask');
        url.searchParams.set('taskId', taskId);
        url.searchParams.set('status', status);
        
        fetch(url.href)
          .then(res => res.json())
          .then(res => handleResult(res))
          .catch(err => {
            alert("Failed: " + err.message);
            renderApp();
          });
      }
    }

    function handleDone(taskId) {
      updateTaskOnWeb(taskId, "Done");
    }

    function handleRevise(taskId) {
      updateTaskOnWeb(taskId, "มีปรับแก้");
    }
    
    function openCommentModal(taskId, taskName) {
      activeTaskId = taskId;
      document.getElementById('modalTaskName').innerText = `งาน: ${taskName}`;
      document.getElementById('commentInput').value = '';
      document.getElementById('commentModalOverlay').classList.add('active');
      setTimeout(() => document.getElementById('commentInput').focus(), 100);
    }
    
    function closeCommentModal() {
      document.getElementById('commentModalOverlay').classList.remove('active');
      activeTaskId = null;
    }
    
    function submitComment() {
      const commentText = document.getElementById('commentInput').value.trim();
      if (!commentText) {
        alert("กรุณาพิมพ์คอมเมนต์ก่อนส่งครับ");
        return;
      }
      
      if (!activeTaskId) return;
      const taskId = activeTaskId;
      
      const submitBtn = document.getElementById('btnSubmitComment');
      const cancelBtn = document.querySelector('.btn-cancel');
      
      submitBtn.disabled = true;
      cancelBtn.disabled = true;
      submitBtn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:5px;"></div> กำลังส่ง...';
      
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(resStr) {
            const res = JSON.parse(resStr);
            if (res.success) {
              // Update local state
              const taskIndex = allTasks.findIndex(t => String(t.id) === String(taskId));
              if (taskIndex !== -1) {
                allTasks[taskIndex].status = "มีปรับแก้";
              }
              closeCommentModal();
              renderApp();
            } else {
              alert("Error: " + res.error);
            }
            // Reset buttons
            submitBtn.disabled = false;
            cancelBtn.disabled = false;
            submitBtn.innerHTML = 'ส่งคอมเมนต์';
          })
          .withFailureHandler(function(err) {
            alert("Failed: " + err.message);
            submitBtn.disabled = false;
            cancelBtn.disabled = false;
            submitBtn.innerHTML = 'ส่งคอมเมนต์';
          })
          .updateTaskFromWeb(taskId, "มีปรับแก้", commentText);
      } else {
        alert("Action not supported in local environment");
        closeCommentModal();
        submitBtn.disabled = false;
        cancelBtn.disabled = false;
        submitBtn.innerHTML = 'ส่งคอมเมนต์';
      }
    }

    function renderApp() {
      const app = document.getElementById('app');
      
      const filteredTasks = currentFilter === 'All' 
        ? allTasks.filter(t => filters.includes(t.status)) 
        : allTasks.filter(t => t.status === currentFilter);

      let controlsHtml = `<div class="controls">`;
      filters.forEach(f => {
        const count = allTasks.filter(t => t.status === f).length;
        const activeClass = currentFilter === f ? 'active' : '';
        const safeFilter = f.replace(/'/g, "\\'");
        controlsHtml += `<button class="filter-btn ${activeClass}" onclick="setFilter('${safeFilter}')">${f} (${count})</button>`;
      });
      controlsHtml += `</div>`;

      let gridHtml = `<div class="dashboard-grid">`;
      if (filteredTasks.length === 0) {
        gridHtml += `<div style="grid-column: 1 / -1; text-align: center; color: #64748b; padding: 3rem;">ไม่พบงานในสถานะนี้</div>`;
      } else {
        filteredTasks.forEach(task => {
          const statusClass = getStatusClass(task.status);
          
          let actionButtons = '';
          if (task.status === "Sent to P'Aof") {
            const key = task.uniqueId || task.id;
            actionButtons = `
              <div class="card-actions">
                <button class="btn-action btn-revise" id="btn-revise-${key}" onclick="handleRevise('${key}')">มีปรับแก้</button>
                <button class="btn-action btn-done" id="btn-done-${key}" onclick="handleDone('${key}')">Done</button>
              </div>
            `;
          }
          
          let brandHtml = '';
          if (task.brand && task.brand.trim() !== '') {
            brandHtml = `<div class="brand-badge">${task.brand}</div>`;
          }
          
          let dateHtml = '';
          if (task.date || task.time) {
            let dateText = task.date || '';
            let timeText = task.time ? ` (${task.time})` : '';
            if (dateText.includes('T')) {
              try {
                const d = new Date(dateText);
                if (!isNaN(d.getTime())) {
                  dateText = d.toLocaleDateString('th-TH', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric'
                  });
                }
              } catch (e) {}
            }
            const finalStr = (dateText + timeText).trim();
            if (finalStr) {
              dateHtml = `<div>📅 ส่งเมื่อ: ${finalStr}</div>`;
            }
          }
          
          let updateHtml = '';
          if (task.comment && String(task.comment).trim() !== '') {
            const commentLines = String(task.comment).trim().split('\n').filter(l => l.trim());
            if (commentLines.length > 0) {
              const lastLog = commentLines[commentLines.length - 1];
              updateHtml = `<div style="font-size: 0.8rem; color: #475569; margin-top: 0.25rem;">🕒 ${lastLog}</div>`;
            }
          }
          
          let detailHtml = '';
          if (task.link && String(task.link).trim() !== '') {
            // task.link คือรายละเอียดงาน (ที่อาจจะมีลิงก์อยู่ข้างใน)
            const detailText = String(task.link).replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // แปลง URL ให้คลิกได้
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const formattedDetail = detailText.replace(urlRegex, function(url) {
              return `<a href="${url}" target="_blank" class="task-link">🔗 เปิดดูรายละเอียดงาน</a>`;
            }).replace(/\n/g, '<br/>');
            
            detailHtml = `<div style="font-size: 0.85rem; color: #475569; margin-top: 0.5rem; background: #f8fafc; padding: 0.5rem; border-radius: 6px; border-left: 3px solid #3b82f6;">${formattedDetail}</div>`;
          }
          
          const taskIdHeader = (task.id && task.id !== '-') ? `<div class="task-header"><span class="task-id">${task.id}</span></div>` : '';
          
          gridHtml += `
            <div class="task-card">
              ${taskIdHeader}
              <h3 class="task-title" style="margin-top:0;">${task.name || '-'}</h3>
              <div style="margin-top: 0.25rem; margin-bottom: 0.25rem;">
                <div class="status-badge ${statusClass}">
                  ${task.status || 'ไม่มีสถานะ'}
                </div>
              </div>
              ${detailHtml}
              <div class="task-meta">
                ${dateHtml}
                ${updateHtml}
              </div>
              <div class="task-owner">
                <div class="owner-avatar">
                  ${(task.owner || '?').charAt(0).toUpperCase()}
                </div>
                <span>${task.owner || '-'}</span>
              </div>
              ${actionButtons}
            </div>
          `;
        });
      }
      gridHtml += `</div>`;

      app.innerHTML = `
        <header class="header">
          <h1>Agent Task Tracker</h1>
          <p>ติดตามสถานะงานผ่านระบบ Agent อัปเดตล่าสุดจาก Google Sheet</p>
        </header>
        ${controlsHtml}
        ${gridHtml}
      `;
    }

    // Start loading & set up silent auto-refresh every 10 seconds
    window.onload = function() {
      loadData(false);
      setInterval(function() {
        loadData(true);
      }, 10000);
    };
  </script>
</body>
