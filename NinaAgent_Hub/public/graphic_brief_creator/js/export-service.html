<script>
// ============================================

function exportToGoogleDocs() {
    if (!selectedBrandId) {
        showAlert('โปรดเลือกแบรนด์ก่อน', 'กรุณาระบุหรือเลือกแบรนด์ลูกค้าเพื่อส่งออกเอกสาร', 'warning');
        return;
    }
    const brand = clientBrands.find(function(b) { return b.id === selectedBrandId; });

    const btns = document.querySelectorAll('button');
    let targetBtn = null;
    btns.forEach(b => { if(b.innerText.includes('Export Google Docs')) targetBtn = b; });
    
    let originalText = '';
    if (targetBtn) {
        originalText = targetBtn.innerHTML;
        targetBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังสร้าง Docs...';
        targetBtn.disabled = true;
    }

    google.script.run
        .withSuccessHandler(function(result) {
            if (targetBtn) { targetBtn.innerHTML = originalText; targetBtn.disabled = false; }
            if (result.success) {
                showAlert('สร้างเอกสารสำเร็จ!', 'ระบบได้สร้าง Google Docs เรียบร้อยแล้ว กำลังเปิดหน้าต่างใหม่...', 'success');
                window.open(result.url, '_blank');
            } else {
                showAlert('เกิดข้อผิดพลาด', result.error, 'error');
            }
        })
        .withFailureHandler(function(error) {
            if (targetBtn) { targetBtn.innerHTML = originalText; targetBtn.disabled = false; }
            showAlert('เชื่อมต่อล้มเหลว', error.message, 'error');
        })
        .createGoogleDocCustomer(brand);
}
