<title>Ad Review Queue</title>
<style>:root {
  color-scheme: light;

  --background: light-dark(rgb(255 255 255), rgb(24 24 24));

  --muted: color-mix(in srgb, var(--foreground) 10%, transparent);
  --muted-foreground: light-dark(

  --accent: light-dark(rgb(229 242 255), rgb(13 39 63));
  --accent-foreground: var(--primary);
  --destructive: light-dark(rgb(226 85 7), rgb(255 133 73));
  --border: light-dark(rgb(26 28 31 / 8%), rgb(255 255 255 / 8.2%));
  --input: light-dark(
    rgb(26 28 31 / 11.8%),

  --ring: light-dark(rgb(51 156 255), rgb(131 195 255 / 76%));
  --font-size-base: 14px;
  --viz-series-1: var(--primary);
  --viz-series-2: light-dark(rgb(243 136 59), rgb(245 154 86));
  --viz-series-3: light-dark(rgb(93 201 119), rgb(116 213 139));
  --viz-series-4: light-dark(rgb(235 119 177), rgb(240 143 192));
  --viz-series-5: light-dark(rgb(155 121 236), rgb(170 145 239));
  --viz-series-6: light-dark(rgb(58 185 177), rgb(90 203 194));

  /* Internal implementation variables; not part of the agent contract. */
  --font-sans: -apple-system, system-ui, "Segoe UI", sans-serif;
  --font-mono:
    ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono",
    monospace;
  --font-size-normal: max(11px, var(--font-size-base));
  --font-size-tooltip: calc(var(--font-size-base) - 1px);
  --font-size-small: max(11px, calc(var(--font-size-base) - 2px));
  --font-size-h1: calc(var(--font-size-normal) * 1.7142857143);

:root[data-theme="light"] {
  color-scheme: light;
}

:root[data-theme="dark"] {
  color-scheme: dark;
}

* {
  box-sizing: border-box;
}

html > body {
  margin: 0;
  padding: 5px;
  color: #182230;
      --muted-foreground: #667085;
  background: transparent !important;
  font-family: var(--font-sans);
  font-size: var(--font-size-normal);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
}

a {
  color: color-mix(in srgb, var(--viz-accent) 80%, var(--viz-text) 20%);
  cursor: pointer;
  font-weight: var(--viz-font-weight-medium);
  text-decoration: none;
  text-underline-offset: 2px;
}

a:is(:hover, :focus-visible) {
  text-decoration-line: underline;
  text-decoration-style: dashed;
  text-decoration-thickness: 0.5px;
}

h1,
h2,
h3,
h4,
h5,
h6,
p {
  margin-block: 0;
}

h1 {
  font-size: var(--font-size-h1);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h2 {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h3,
h4,
h5,
h6 {
  font-size: var(--font-size-h3);
  font-weight: var(--font-weight-medium);
  line-height: 1.3;
}

b,
strong,
th {
  font-weight: var(--font-weight-medium);
}

code:not(pre code) {
  display: inline;
  padding: 1px 6px;
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background: var(--muted);
  font-family: var(--font-mono);
  font-size: 0.92em;
  overflow-wrap: anywhere;
  -webkit-box-decoration-break: clone;
  box-decoration-break: clone;
  word-break: break-word;
}

.table-responsive {
  width: 100%;
  overflow-x: auto;
  scrollbar-width: thin;
}

.table {
  width: 100%;
  border-collapse: collapse;
  color: var(--foreground);
  font: inherit;
  text-align: start;
}

.table :is(th, td) {
  padding-block: 10px;
  padding-inline: 0 24px;
  overflow-wrap: anywhere;
  border-bottom: 1px solid var(--border);
  text-align: start;
  vertical-align: top;
}

.table-responsive > .table :is(th, td) {
  overflow-wrap: break-word;
}

.table :is(th, td):last-child {
  padding-inline-end: 0;
}

.table :is(caption, thead th) {
  font-weight: 600;
}

.table thead th {
  padding-block: 8px;
  border-bottom-color: color-mix(in srgb, var(--foreground) 16%, transparent);
}

.table tbody tr:last-child :is(th, td) {
  border-bottom: 0;
}

.table.table-sm :is(th, td) {
  padding-block: 6px;
}

.table.table-sm :is(th, td):not(:last-child) {
  padding-inline-end: 16px;
}

.table :is(.text-end, [align="right"]) {
  text-align: end;
  font-variant-numeric: tabular-nums;
}

.table :is(.text-center, [align="center"]) {
  text-align: center;
}

.table .text-nowrap {
  white-space: nowrap;
}

#widget {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  padding: 0;
  background: transparent !important;
}

.card {
  min-width: 0;
  padding: 12px;
  overflow: hidden;
  overflow-wrap: break-word;
  border-radius: var(--radius-2xl);
  corner-shape: superellipse(1.5);
  color: var(--card-foreground);
  background: var(--card);
}

#widget > :not(.card) {
  width: 100% !important;
  max-width: none !important;
  margin: 0 !important;
  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
}

.tooltip {
  position: fixed;
  z-index: 50;
  top: 0;
  left: 0;
  width: max-content;
  max-width: min(
    20rem,
    var(--tooltip-available-width, calc(100vw - 10px)),
    calc(100vw - 10px)
  );
  max-height: min(
    var(--tooltip-available-height, calc(100vh - 10px)),
    calc(100vh - 10px)
  );
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--popover-foreground);
  background: var(--popover);
  box-shadow: none;
  font-size: var(--font-size-tooltip);
  line-height: var(--line-height-tooltip);
  overflow-wrap: break-word;
  white-space: normal;
  pointer-events: none;
  user-select: none;
}

.viz-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(max(180px, 24%), 1fr));
  gap: 10px;
}

.viz-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.viz-stat-value {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

.viz-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}

.viz-badge {
  padding: 3px 8px;
  border-radius: var(--radius-full);
  color: var(--accent-foreground);
  background: var(--accent);
  font-weight: var(--font-weight-medium);
}

small,
.text-small,
.viz-badge {
  font-size: var(--font-size-small);
  line-height: var(--line-height-small);
}

.text-muted {
  color: #667085;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.viz-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

.viz-controls > .form-label {
  display: grid;
  min-width: min(100%, 260px);
  flex: 1 1 280px;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: baseline;
  gap: 2px 12px;
  margin-bottom: 0;
}

.viz-controls > .form-label > :is(.form-control, .form-range, .form-select) {
  grid-column: 1 / -1;
}

.btn,
.form-check-input,
.form-control,
.form-range,
.form-select {
  font: inherit;
}

.btn {
  appearance: button;
  display: inline-flex;
  inline-size: fit-content;
  max-inline-size: 100%;
  min-height: 28px;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin: 0;
  padding: 0 8px;
  -webkit-app-region: no-drag;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: var(--cursor-interaction, pointer);
  text-align: center;
  text-decoration: none;
  white-space: nowrap;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

.btn:is(.btn-block, .viz-tile) {
  inline-size: 100%;
}

.btn.viz-tile {
  min-width: 0;
  overflow-wrap: anywhere;
  white-space: normal;
}

a.btn {
  cursor: pointer;
  text-decoration: none;
}

.btn:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn-primary {
  border-color: transparent;
  color: var(--primary-foreground);
  background: var(--foreground);
  background-clip: padding-box;
}

.btn-primary .text-muted {
  color: color-mix(in srgb, var(--primary-foreground) 50%, transparent);
}

.btn-primary:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 80%, transparent);
  background-clip: padding-box;
}

.btn-ghost {
  border-color: transparent;
  color: #667085;
  background: transparent;
}

.btn-ghost:not(:disabled):hover {
  color: var(--foreground);
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

[data-lucide] {
  stroke-width: 1.6;
}

.form-label {
  display: block;
  margin-bottom: 6px;
  color: var(--foreground);
}

.form-control {
  display: block;
  width: 100%;
  min-height: 28px;
  padding: 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background: var(--secondary);
}

.form-control::placeholder {
  color: #667085;
}

.form-control[type="file"] {
  padding: 0;
  overflow: hidden;
  cursor: var(--cursor-interaction, pointer);
}

.form-control[type="file"]::file-selector-button {
  min-height: 26px;
  margin-right: 8px;
  padding: 0 8px;
  border: 0;
  border-right: 1px solid var(--input);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: inherit;
  font: inherit;
}

.form-control[type="file"]:not(:disabled):hover::file-selector-button {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-control-color[type="color"] {
  width: 40px;
  height: 28px;
  padding: 3px;
  cursor: var(--cursor-interaction, pointer);
}

.form-control-color[type="color"]::-webkit-color-swatch-wrapper {
  padding: 0;
}

.form-control-color[type="color"]::-webkit-color-swatch {
  border: 0;
  border-radius: calc(var(--radius-lg) - 4px);
  corner-shape: superellipse(1.5);
}

textarea.form-control {
  height: auto;
  min-height: 72px;
  padding: 8px 10px;
  resize: vertical;
}

.form-control:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-control:disabled,
.form-select:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.form-select {
  appearance: none;
  display: block;
  width: 100%;
  min-height: 28px;
  margin: 0;
  padding: 0 32px 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background-color: var(--secondary);
  background-image:
    linear-gradient(45deg, transparent 50%, var(--muted-foreground) 50%),
    linear-gradient(135deg, var(--muted-foreground) 50%, transparent 50%);
  background-position:
    calc(100% - 14px) 50%,
    calc(100% - 10px) 50%;
  background-repeat: no-repeat;
  background-size: 4px 4px;
  cursor: var(--cursor-interaction, default);
}

.form-select:not(:disabled):hover {
  background-color: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-select:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-check {
  display: flex;
  min-height: 20px;
  align-items: center;
  gap: 6px;
}

.form-check-input {
  appearance: none;
  width: 14px;
  height: 14px;
  flex: 0 0 auto;
  margin: 0;
  border: 1px solid var(--input);
  color: var(--primary-foreground);
  background-color: transparent;
  cursor: var(--cursor-interaction, default);
  transition:
    background-color 150ms,
    border-color 150ms,
    box-shadow 150ms;
}

.form-check:not(.form-switch) .form-check-input[type="checkbox"] {
  border-color: var(--input);
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background-color: var(--secondary);
  box-shadow: var(--shadow-sm);
}

.form-check:not(.form-switch)
  .form-check-input:not(:disabled):not(:checked):hover {
  background-color: var(--card);
}

.form-check:not(.form-switch) .form-check-input[type="checkbox"]:checked {
  border-color: var(--primary);
  background-color: var(--primary);
}

.form-check:not(.form-switch)
  .form-check-input[type="checkbox"]:checked::before {
  display: block;
  width: 100%;
  height: 100%;
  background: var(--primary-foreground);
  content: "";
  mask: var(--checkmark-image) center / 12px 12px no-repeat;
}

.form-check-input[type="radio"] {
  width: 14px;
  height: 14px;
  border-radius: var(--radius-full);
}

.form-check-input[type="radio"]:checked {
  border: 2px solid var(--primary);
  background:
    radial-gradient(circle, var(--primary-foreground) 0 2.5px, transparent 3px),
    var(--primary);
}

.form-check:not(.form-switch) .form-check-input:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

.form-check:not(.form-switch) .form-check-input:disabled {
  cursor: not-allowed;
  pointer-events: none;
}

.form-check:not(.form-switch) .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
}

.form-switch .form-check-input:disabled,
.form-switch .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
  opacity: 0.6;
}

.form-check-label {
  color: var(--foreground);
  cursor: var(--cursor-interaction, default);
}

.form-switch .form-check-input {
  position: relative;
  width: 32px;
  height: 20px;
  border: 0;
  border-radius: var(--radius-full);
  background: var(--muted);
  box-shadow: none;
  transition: background-color 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input::before {
  position: absolute;
  top: 50%;
  left: 0;
  width: 16px;
  height: 16px;
  box-sizing: border-box;
  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: "";
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed="true"],
    [aria-selected="true"],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed="true"], [aria-selected="true"], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget > svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

html>body{padding:0}</style>
</head>
<body>
<div id="ad-review-queue" class="ad-review">
  <style>
    #ad-review-queue {
      --age-fresh: #22A06B;
      --bg-fresh: #EAF8F1;
      --age-watch: #E58A00;
      --bg-watch: #FFF6DF;
      --age-stale: #D92D20;
      --bg-stale: #FFF0EE;
      color: var(--foreground);
      display: grid;
      gap: 20px;
      padding: 4px;
    }
    #ad-review-queue .topbar,
    #ad-review-queue .queue-head,
    #ad-review-queue .item-top,
    #ad-review-queue .item-bottom,
    #ad-review-queue .person,
    #ad-review-queue .legend,
    #ad-review-queue .actions,
    #ad-review-queue .meta {
      display: flex;
      align-items: center;
    }
    #ad-review-queue .topbar,
    #ad-review-queue .queue-head,
    #ad-review-queue .item-top,
    #ad-review-queue .item-bottom {
      justify-content: space-between;
      gap: 16px;
    }
    #ad-review-queue .eyebrow {
      color: #667085;
      margin: 0 0 4px;
    }
    #ad-review-queue h2,
    #ad-review-queue h3,
    #ad-review-queue p {
      margin-top: 0;
    }
    #ad-review-queue h2 {
      margin-bottom: 4px;
    }
    #ad-review-queue h3 {
      margin-bottom: 6px;
    }
    #ad-review-queue .updated {
      color: #667085;
      margin: 0;
    }
    #ad-review-queue .summary {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    #ad-review-queue .summary .card {
      min-width: 0;
    }
    #ad-review-queue .stat-context {
      color: #667085;
      margin: 4px 0 0;
    }
    #ad-review-queue .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    #ad-review-queue .queue-tools {
      display: flex;
      align-items: end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    #ad-review-queue .sort-field {
      min-width: 190px;
    }
    #ad-review-queue .sort-field .form-label {
      display: block;
    }
    #ad-review-queue .legend {
      flex-wrap: wrap;
      gap: 10px 16px;
      color: #667085;
    }
    #ad-review-queue .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    #ad-review-queue .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--age-color);
      flex: 0 0 auto;
    }
    #ad-review-queue .fresh { --age-color: var(--age-fresh); --bg-color: var(--bg-fresh); }
    #ad-review-queue .watch { --age-color: var(--age-watch); --bg-color: var(--bg-watch); }
    #ad-review-queue .stale { --age-color: var(--age-stale); --bg-color: var(--bg-stale); }
    #ad-review-queue .queue-list {
      display: grid;
      gap: 12px;
    }
    #ad-review-queue .queue-item {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 18px;
      padding: 16px;
      border-left: 6px solid var(--age-color);
      border-bottom: 1px solid var(--border);
      background: var(--bg-color, var(--card));
    }
    #ad-review-queue .thumb {
      min-height: 112px;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--age-color) 18%, var(--muted));
      color: var(--card-foreground);
      border: 1px solid color-mix(in srgb, var(--age-color) 38%, var(--border));
    }
    #ad-review-queue .thumb-mark {
      display: grid;
      gap: 6px;
      text-align: center;
    }
    #ad-review-queue .thumb-mark i {
      margin: 0 auto;
    }
    #ad-review-queue .badges,
    #ad-review-queue .meta,
    #ad-review-queue .actions {
      flex-wrap: wrap;
      gap: 8px;
    }
    #ad-review-queue .age-badge {
      background: color-mix(in srgb, var(--age-color) 18%, var(--card));
      color: var(--card-foreground);
      border: 1px solid color-mix(in srgb, var(--age-color) 55%, var(--border));
    }
    #ad-review-queue .meta {
      color: #667085;
      margin-top: 10px;
    }
    #ad-review-queue .meta span,
    #ad-review-queue .person {
      gap: 6px;
    }
    #ad-review-queue .item-bottom {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
    }
    #ad-review-queue .avatar {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: var(--primary-foreground);
    }
    #ad-review-queue .empty {
      color: #667085;
      padding: 24px 0;
      text-align: center;
    }
    #ad-review-queue .toast {
      color: var(--foreground);
      background: var(--accent);
      padding: 10px 12px;
      margin: 0;
      display: none;
    }
    #ad-review-queue .toast.show { display: block; }
    @media (max-width: 735px) {
      #ad-review-queue .summary { grid-template-columns: 1fr; }
      #ad-review-queue .queue-item { grid-template-columns: 80px minmax(0, 1fr); }
      #ad-review-queue .thumb { min-height: 80px; }
      #ad-review-queue .item-top,
      #ad-review-queue .item-bottom,
      #ad-review-queue .topbar { align-items: flex-start; flex-direction: column; }
    }
    @media (max-width: 440px) {
      #ad-review-queue .queue-item { grid-template-columns: 1fr; }
      #ad-review-queue .thumb { min-height: 120px; }
      #ad-review-queue .actions { width: 100%; }
      #ad-review-queue .actions .btn { flex: 1 1 auto; }
    }
  </style>

  <header class="topbar">
    <div>
      <p class="eyebrow text-small">CREATIVE TEAM</p>
      <h2>คิวงานรอรีวิว</h2>
      <p class="updated text-small">อัปเดตล่าสุด วันนี้ 10:32 น.</p>
    </div>
    <button class="btn" type="button" id="refresh-queue"><i data-lucide="refresh-cw" aria-hidden="true"></i> อัปเดตคิว</button>
  </header>

  <section class="viz-grid summary" aria-label="สรุปคิวงาน">
    <div class="card viz-stat">
      <span class="text-muted">รอรีวิวทั้งหมด</span>
      <strong class="viz-stat-value" id="waiting-count">-</strong>
      <p class="stat-context text-small" id="waiting-today-context">กำลังโหลด...</p>
    </div>
    <div class="card viz-stat">
      <span class="text-muted">ค้างนานเกิน 4 ชม.</span>
      <strong class="viz-stat-value" id="stale-count">-</strong>
      <p class="stat-context text-small">ควรหยิบขึ้นมารีวิวก่อน</p>
    </div>
    <div class="card viz-stat">
      <span class="text-muted">งานที่เก่าที่สุด</span>
      <strong class="viz-stat-value" id="oldest-time">-</strong>
      <p class="stat-context text-small" id="oldest-name">-</p>
    </div>
  </section>

  <div class="queue-tools">
    <nav class="tabs" aria-label="สถานะงาน">
      <button class="btn btn-primary tab-button" type="button" aria-pressed="true" data-tab="waiting">รอรีวิว <span id="tab-waiting-count">-</span></button>
      <button class="btn tab-button" type="button" aria-pressed="false" data-tab="revision">มีปรับแก้ <span id="needs-revision-count">-</span></button>
      <button class="btn tab-button" type="button" aria-pressed="false" data-tab="approved">อนุมัติวันนี้ <span id="approved-today-count">-</span></button>
    </nav>
    <label class="form-label sort-field">เรียงคิว
      <select class="form-select" id="queue-sort">
        <option value="priority">งานเร่งก่อน</option>
        <option value="oldest">งานเก่าก่อน</option>
        <option value="deadline">กำหนดส่งใกล้ก่อน</option>
      </select>
    </label>
  </div>

  <div class="legend text-small" aria-label="ความหมายของสีการ์ด">
    <strong>สีตามอายุคิว:</strong>
    <span class="legend-item fresh"><span class="dot"></span>ไม่เกิน 2 ชม. — คิวใหม่</span>
    <span class="legend-item watch"><span class="dot"></span>2–4 ชม. — เริ่มนาน</span>
    <span class="legend-item stale"><span class="dot"></span>เกิน 4 ชม. — ค้างนาน</span>
  </div>

  <p class="toast text-small" id="queue-toast" role="status" aria-live="polite"></p>

  <section class="queue-list" id="queue-list" aria-label="รายการงานรอรีวิว">
    <div class="empty">กำลังโหลดข้อมูลคิว...</div>
  </section>

  <script>
    (() => {
      const root = document.getElementById('ad-review-queue');
      const list = root.querySelector('#queue-list');
      const toast = root.querySelector('#queue-toast');
      
      let rawTasks = [];
      let currentTab = 'waiting';

      const announce = (htmlMessage, duration = 4000) => {
        toast.innerHTML = htmlMessage;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), duration);
      };

      // คำนวณช่วงเวลาทำงาน 09:00 - 18:00 น. (จันทร์-ศุกร์)
      const calculateWorkingHoursDiff = (sentToReviewAt) => {
        if (!sentToReviewAt) return 0;
        let start = new Date(sentToReviewAt);
        let end = new Date();
        if (isNaN(start.getTime()) || start >= end) return 0;

        let totalMinutes = 0;
        let cur = new Date(start);

        while (cur < end) {
          const day = cur.getDay(); // 0 = Sun, 6 = Sat
          if (day !== 0 && day !== 6) { // จันทร์ - ศุกร์
            const hour = cur.getHours();
            if (hour >= 9 && hour < 18) {
              totalMinutes++;
            }
          }
          cur.setMinutes(cur.getMinutes() + 1);
        }
        return totalMinutes / 60;
      };

      const calculateAgeHours = (sentToReviewAt) => {
        return calculateWorkingHoursDiff(sentToReviewAt);
      };

      const getAgeString = (sentToReviewAt) => {
        if (!sentToReviewAt) return 'คิวใหม่';
        const totalMins = Math.floor(calculateWorkingHoursDiff(sentToReviewAt) * 60);
        if (totalMins <= 0) return 'คิวใหม่';
        
        const diffHrs = Math.floor(totalMins / 60);
        const diffMins = totalMins % 60;
        
        if (diffHrs >= 4) {
          if (diffHrs > 0 && diffMins > 0) return `ค้าง ${diffHrs} ชม. ${diffMins} นาที`;
          return `ค้าง ${diffHrs} ชม.`;
        }
        
        if (diffHrs > 0 && diffMins > 0) return `รอ ${diffHrs} ชม. ${diffMins} นาที`;
        if (diffHrs > 0) return `รอ ${diffHrs} ชม.`;
        return `รอ ${diffMins} นาที`;
      };

      const getAgeClass = (ageHours) => {
        if (ageHours > 4) return 'stale';
        if (ageHours >= 2) return 'watch';
        return 'fresh';
      };

      const formatDateTimeStr = (isoStr, prefix = '') => {
        if (!isoStr) return '-';
        const d = new Date(isoStr);
        if (isNaN(d.getTime())) return '-';
        const thMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        const day = d.getDate();
        const month = thMonths[d.getMonth()];
        const year = d.getFullYear();
        const hh = d.getHours().toString().padStart(2, '0');
        const mins = d.getMinutes().toString().padStart(2, '0');
        return `${prefix}${day} ${month} ${year} · ${hh}:${mins}`;
      };

      const renderList = () => {
        const pendingTasks = rawTasks.filter(t => t.status === "รอรีวิว");
        const revisionTasks = rawTasks.filter(t => t.status === "มีปรับแก้");
        const approvedTasks = rawTasks.filter(t => t.status === "อนุมัติแล้ว");

        root.querySelector('#waiting-count').textContent = pendingTasks.length;
        root.querySelector('#tab-waiting-count').textContent = pendingTasks.length;
        root.querySelector('#needs-revision-count').textContent = revisionTasks.length;
        root.querySelector('#approved-today-count').textContent = approvedTasks.length;
        
        const staleCount = pendingTasks.filter(t => calculateAgeHours(t.sentToReviewAt) > 4).length;
        root.querySelector('#stale-count').textContent = staleCount;

        const todayStr = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: '2-digit', day: '2-digit' });
        const sentTodayCount = pendingTasks.filter(t => new Date(t.sentToReviewAt).toLocaleDateString('th-TH', { year: 'numeric', month: '2-digit', day: '2-digit' }) === todayStr).length;
        const waitingTodayEl = root.querySelector('#waiting-today-context');
        if (waitingTodayEl) waitingTodayEl.textContent = `เพิ่มมา ${sentTodayCount} งานในวันนี้`;

        const oldestTimeEl = root.querySelector('#oldest-time');
        const oldestNameEl = root.querySelector('#oldest-name');
        if (pendingTasks.length > 0) {
           let oldestTask = pendingTasks[0];
           let maxAgeMs = -1;
           const now = new Date();
           pendingTasks.forEach(t => {
              const ageMs = t.sentToReviewAt ? Math.max(0, now - new Date(t.sentToReviewAt)) : 0;
              if (ageMs > maxAgeMs) { maxAgeMs = ageMs; oldestTask = t; }
           });
           if (oldestTimeEl && oldestNameEl) {
              oldestTimeEl.textContent = getAgeString(oldestTask.sentToReviewAt);
              oldestNameEl.textContent = oldestTask.name;
           }
        } else {
           if (oldestTimeEl) oldestTimeEl.textContent = '-';
           if (oldestNameEl) oldestNameEl.textContent = 'ไม่มีงานค้าง';
        }

        let tasksToRender = [];
        if (currentTab === 'waiting') tasksToRender = pendingTasks;
        else if (currentTab === 'revision') tasksToRender = revisionTasks;
        else if (currentTab === 'approved') tasksToRender = approvedTasks;

        const sortSelect = root.querySelector('#queue-sort');
        const sortKey = sortSelect ? sortSelect.value : 'priority';

        tasksToRender.sort((a, b) => {
           const aUrgent = a.name.includes("ด่วน") || a.name.includes("เร่ง");
           const bUrgent = b.name.includes("ด่วน") || b.name.includes("เร่ง");
           if (sortKey === 'priority') {
             if (aUrgent && !bUrgent) return -1;
             if (!aUrgent && bUrgent) return 1;
             const ageA = calculateAgeHours(a.sentToReviewAt);
             const ageB = calculateAgeHours(b.sentToReviewAt);
             return ageB - ageA;
           }
           if (sortKey === 'oldest') {
             return calculateAgeHours(b.sentToReviewAt) - calculateAgeHours(a.sentToReviewAt);
           }
           return new Date(a.deadline || a.date) - new Date(b.deadline || b.date);
        });

        list.innerHTML = '';
        if (tasksToRender.length === 0) {
           list.innerHTML = '<div class="empty">ไม่มีรายการในหมวดหมู่นี้</div>';
           return;
        }

        tasksToRender.forEach(task => {
          const ageHours = calculateAgeHours(task.sentToReviewAt);
          const ageClass = currentTab === 'waiting' ? getAgeClass(ageHours) : 'fresh';
          
          let actionButtons = '';
          if (currentTab === 'waiting' || currentTab === 'revision') {
            actionButtons = `
              <button class="btn action-revise" type="button" onclick="handleAction('${task.id}', 'มีปรับแก้')"><i data-lucide="undo-2" aria-hidden="true"></i> ส่งกลับแก้</button>
              <button class="btn btn-primary action-approve" type="button" onclick="handleAction('${task.id}', 'อนุมัติแล้ว')"><i data-lucide="check" aria-hidden="true"></i> อนุมัติ</button>
            `;
          }

          const isUrgent = task.name.includes("ด่วน") || task.name.includes("เร่ง");
          const priorityBadge = isUrgent ? `<span class="viz-badge" style="background:#ef4444;color:white;">ด่วน</span>` : '';
          
          let ageBadgeStr = '';
          let timeMetaStr = '';
          if (currentTab === 'waiting') {
            ageBadgeStr = `<span class="viz-badge age-badge">${getAgeString(task.sentToReviewAt)}</span>`;
            timeMetaStr = formatDateTimeStr(task.sentToReviewAt, 'ส่งเมื่อ ');
          } else if (currentTab === 'revision') {
            ageBadgeStr = `<span class="viz-badge" style="background:#FFF6DF;color:#E58A00;border:1px solid #E58A00;">มีปรับแก้</span>`;
            timeMetaStr = formatDateTimeStr(task.reviewedAt, 'ส่งกลับแก้เมื่อ ') + (task.reviewedAt ? ` · รอทีมแก้ ${getAgeString(task.reviewedAt)}` : '');
          } else if (currentTab === 'approved') {
            ageBadgeStr = `<span class="viz-badge" style="background:#EAF8F1;color:#22A06B;border:1px solid #22A06B;">อนุมัติแล้ว</span>`;
            timeMetaStr = formatDateTimeStr(task.reviewedAt, 'อนุมัติเมื่อ ');
          }

          let roundStr = task.revisionRound > 0 ? `<span><i data-lucide="rotate-ccw" aria-hidden="true"></i> รอบที่ ${task.revisionRound}</span>` : '';
          const linkHtml = task.link ? `<a class="btn" href="${task.link}" target="_blank"><i data-lucide="external-link" aria-hidden="true"></i> เปิดไฟล์งาน</a>` : '';

          const cardHTML = `
            <article class="queue-item ${ageClass}" data-age="${ageHours}" data-priority="${isUrgent ? 1 : 0}">
              <!-- Thumbnail -->
              <div class="thumb">${priorityBadge}<i data-lucide="image" aria-hidden="true"></i><span>Preview</span></div>
              
              <!-- Content -->
              <div class="content-wrapper">
                <div class="item-top">
                  <div>
                    <h3>${task.name}</h3>
                    <div class="badges">
                      ${priorityBadge}
                      ${ageBadgeStr}
                    </div>
                  </div>
                </div>
                <div class="meta text-small">
                  ${task.brand ? `<span><i data-lucide="building-2" aria-hidden="true"></i> ${task.brand}</span>` : ''}
                  ${roundStr}
                  <span><i data-lucide="clock-3" aria-hidden="true"></i> ${timeMetaStr}</span>
                </div>
                <div class="item-bottom">
                  <span class="person"><span class="avatar">${task.owner ? task.owner.charAt(0) : '?'}</span> ${task.owner || 'ไม่ระบุ'}</span>
                  <div class="actions">
                    ${linkHtml}
                    ${actionButtons}
                  </div>
                </div>
              </div>
            </article>
          `;
          list.insertAdjacentHTML('beforeend', cardHTML);
        });

        if (globalThis.lucide) {
           globalThis.lucide.createIcons({ attrs: { width: 16, height: 16 } });
        }
      };

      const loadData = () => {
        list.innerHTML = '<div class="empty">กำลังโหลดข้อมูลคิว...</div>';
        google.script.run
          .withSuccessHandler(resStr => {
            try {
              const res = JSON.parse(resStr);
              if (res.success) {
                rawTasks = res.tasks;
                renderList();
                const d = new Date();
                root.querySelector('.updated').textContent = `อัปเดตล่าสุด วันนี้ ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')} น.`;
              } else {
                list.innerHTML = '<div class="empty" style="color:var(--destructive)">Error: ' + res.error + '</div>';
              }
            } catch(e) {
              list.innerHTML = '<div class="empty" style="color:var(--destructive)">Parsing Error: ' + e.message + '</div>';
            }
          })
          .withFailureHandler(err => {
             list.innerHTML = '<div class="empty" style="color:var(--destructive)">Error: ' + err.message + '</div>';
          })
          .getTasksData();
      };

      window.handleAction = (taskId, newStatus) => {
        if (newStatus === "มีปรับแก้" && !confirm('ยืนยันส่งกลับแก้ไขงานชิ้นนี้?')) return;
        
        const prevTask = rawTasks.find(t => t.id === taskId);
        const prevStatus = prevTask ? prevTask.status : 'รอรีวิว';

        announce('กำลังอัปเดต...');
        
        google.script.run
          .withSuccessHandler(resStr => {
             try {
               const res = JSON.parse(resStr);
               if (res.success) {
                 if (newStatus === "อนุมัติแล้ว") {
                   announce(`✅ อนุมัติงาน "${res.taskName}" แล้ว <button class="btn" style="margin-left:8px;padding:2px 6px;" onclick="undoAction('${taskId}', '${prevStatus}')">Undo (ยกเลิก)</button>`, 6000);
                 } else {
                   announce(`📝 เปลี่ยนสถานะงาน "${res.taskName}" เป็นมีปรับแก้แล้ว`);
                 }
               } else {
                 alert('Error: ' + res.error);
               }
             } catch(e) {}
             loadData();
          })
          .withFailureHandler(err => {
             alert('Error: ' + err.message);
             loadData();
          })
          .updateTaskFromWeb(taskId, newStatus, "");
      };

      window.undoAction = (taskId, previousStatus) => {
        announce('กำลังยกเลิกรายการ...');
        google.script.run
          .withSuccessHandler(() => {
             announce('ยกเลิกรายการเรียบร้อยแล้ว');
             loadData();
          })
          .updateTaskFromWeb(taskId, previousStatus, "");
      };

      root.querySelectorAll('.tab-button').forEach((button) => {
        button.addEventListener('click', () => {
          root.querySelectorAll('.tab-button').forEach((peer) => {
            const active = peer === button;
            peer.setAttribute('aria-pressed', String(active));
            peer.classList.toggle('btn-primary', active);
          });
          currentTab = button.dataset.tab;
          renderList();
        });
      });

      root.querySelector('#queue-sort').addEventListener('change', () => {
        renderList();
      });

      root.querySelector('#refresh-queue').addEventListener('click', () => {
        announce('กำลังอัปเดตข้อมูล...');
        loadData();
      });
      
      // Initial load
      loadData();
    })();
  </script></div>

<script src="https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js"></script>
<script src="https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js"></script>
<script>
(() => {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set(["top", "right", "bottom", "left"]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =>
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest("[data-tooltip]")
      : null;
  const containsTarget = (trigger, target) =>
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =>
    trigger.getAttribute("data-tooltip")?.trim() ?? "";
  const getPlacement = (trigger) => {
    const placement = trigger.getAttribute("data-tooltip-placement");
    return tooltipPlacements.has(placement) ? placement : "top";
  };
  const getTooltip = () => {
    if (tooltip == null) {
      tooltip = document.createElement("div");
      tooltip.id = tooltipId;
      tooltip.className = "tooltip";
      tooltip.setAttribute("role", "tooltip");
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) => {
    const ids = new Set(
      (trigger.getAttribute("aria-describedby") ?? "")
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute("aria-describedby");
    } else {
      trigger.setAttribute("aria-describedby", [...ids].join(" "));
    }
  };
  const clearOpenTimeout = () => {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) => {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) => {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              "--tooltip-available-width",
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              "--tooltip-available-height",
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: "fixed",
    })
      .then(({ x, y }) => {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = "visible";
      })
      .catch(() => {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) => {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = "hidden";
    floating.style.transform = "translate(0, 0)";
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () => {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) => {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() < skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() => {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) => {
    if (event.pointerType === "touch") {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) => {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) => {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(":focus-visible")) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) => {
    if (event.key === "Escape") {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) => {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () => {
    closeTooltip(false);
    document.removeEventListener("pointerover", handlePointerOpen);
    document.removeEventListener("pointerout", handleLeave);
    document.removeEventListener("focusin", handleFocusIn);
    document.removeEventListener("focusout", handleLeave);
    document.removeEventListener("keydown", handleKeyDown);
    document.removeEventListener("contextmenu", handleContextMenu);
    tooltip = null;
  };

  document.addEventListener("pointerover", handlePointerOpen);
  document.addEventListener("pointerout", handleLeave);
  document.addEventListener("focusin", handleFocusIn);
  document.addEventListener("focusout", handleLeave);
  document.addEventListener("keydown", handleKeyDown);
  document.addEventListener("contextmenu", handleContextMenu);
  window.addEventListener("pagehide", destroy, { once: true });
})();
</script>
<script id="codex-visualization-lucide" async src="https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js"></script>
<script>
(() => {
  const initialize = () => {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById("codex-visualization-lucide")
    ?.addEventListener("load", initialize, { once: true });
})();
</script>
